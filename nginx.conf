server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # The whole game is index.html — code, tables and Jane's art, inlined. There
  # is nothing beside it to cache separately, and it must always be revalidated
  # or a redeploy never reaches anyone.
  location / {
    add_header Cache-Control "public, max-age=0, must-revalidate";
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/html;
}
