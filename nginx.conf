server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # Hashed-by-content it is not, so revalidate the asset bundle. Jane changes
  # art far more often than anyone redeploys the engine.
  location = /assets.json {
    add_header Cache-Control "public, max-age=0, must-revalidate";
  }

  location /dist/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # It's a single page. Anything unknown is the game.
  location / {
    try_files $uri $uri/ /index.html;
  }

  gzip on;
  gzip_types text/html text/javascript application/json;
}
